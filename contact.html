<main>
<section class="container py-5">

    <div class="row">

        <div class="col-md-7">

            <h2 class="mb-4">Contactez-nous</h2>

            <form id="contactForm">

                <div class="mb-3">

                    <label class="form-label">Nom</label>

                    <input type="text"
                    class="form-control"
                    id="nom">

                    <small class="text-danger" id="nomError"></small>

                </div>

                <div class="mb-3">

                    <label class="form-label">Prénom</label>

                    <input type="text"
                    class="form-control"
                    id="prenom">

                    <small class="text-danger" id="prenomError"></small>

                </div>

                <div class="mb-3">

                    <label class="form-label">Email</label>

                    <input type="email"
                    class="form-control"
                    id="email">

                    <small class="text-danger" id="emailError"></small>

                </div>

                <div class="mb-3">

                    <label class="form-label">Sujet</label>

                    <select class="form-select" id="sujet">

                        <option value="">Choisir un sujet</option>

                        <option>Support</option>

                        <option>Recrutement</option>

                        <option>Information</option>

                        <option>Partenariat</option>

                    </select>

                    <small class="text-danger" id="sujetError"></small>

                </div>

                <div class="mb-3">

                    <label class="form-label">Message</label>

                    <textarea class="form-control"
                    rows="5"
                    id="message"></textarea>

                    <small class="text-danger" id="messageError"></small>

                </div>

                <button type="submit"
                class="btn btn-primary">

                    Envoyer

                </button>

                <div id="successMessage"
                class="alert alert-success mt-4 d-none">

                    Message envoyé avec succès ✅

                </div>

            </form>

        </div>

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h3>Informations</h3>

                <p>
                    📧 contact@afritalent.com
                </p>

                <p>
                    📞 +221 77 650 20 54
                </p>

                <p>
                    📍 Dakar, Sénégal
                </p>

            </div>

        </div>

    </div>
